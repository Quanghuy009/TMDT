<header class="flex justify-between items-center w-full px-gutter h-16 ml-64 max-w-[calc(100%-16rem)] bg-surface sticky top-0 border-b border-outline-variant z-40">

    <div class="flex items-center gap-4 flex-1">
        <div class="relative w-full max-w-md">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">
                search
            </span>

            <input class="w-full pl-10 pr-4 py-2 bg-surface-container-low border border-outline-variant rounded-full text-sm focus:ring-2 focus:ring-primary outline-none transition-all"
                   placeholder="Tìm kiếm sản phẩm, đơn hàng, khách hàng..."
                   type="text"/>
        </div>
    </div>

    <div class="flex items-center gap-4">
        <button class="p-2 rounded-full hover:bg-surface-container transition-colors text-on-surface-variant focus:ring-2 focus:ring-primary">
            <span class="material-symbols-outlined">notifications</span>
        </button>

        <button class="p-2 rounded-full hover:bg-surface-container transition-colors text-on-surface-variant focus:ring-2 focus:ring-primary">
            <span class="material-symbols-outlined">settings</span>
        </button>

        <button class="p-2 rounded-full hover:bg-surface-container transition-colors text-on-surface-variant focus:ring-2 focus:ring-primary">
            <span class="material-symbols-outlined">logout</span>
        </button>
    </div>

</header>
