<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECH-STORE</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#f6faff",
                        "surface-dim": "#d2dbe4",
                        "on-surface": "#141d23",
                        "primary-container": "#be1e2d",
                        "on-background": "#141d23",
                        "surface-bright": "#f6faff",
                        "on-primary-container": "#ffd3d1",
                        "on-tertiary": "#ffffff",
                        "outline": "#8f6f6e",
                        "inverse-primary": "#ffb3b0",
                        "error": "#ba1a1a",
                        "secondary-fixed": "#e2e2e2",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#ffffff",
                        "primary-fixed-dim": "#ffb3b0",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed": "#1b1b1b",
                        "secondary": "#5e5e5e",
                        "secondary-container": "#e2e2e2",
                        "on-tertiary-container": "#dcdedf",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#474747",
                        "inverse-on-surface": "#e9f2fb",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed": "#191c1d",
                        "surface-container-highest": "#dbe4ed",
                        "surface-variant": "#dbe4ed",
                        "background": "#f6faff",
                        "on-primary": "#ffffff",
                        "tertiary": "#484a4b",
                        "tertiary-fixed-dim": "#c5c7c8",
                        "surface-tint": "#b91a2a",
                        "outline-variant": "#e3bebb",
                        "surface-container-high": "#e0e9f2",
                        "tertiary-container": "#5f6263",
                        "inverse-surface": "#293138",
                        "on-primary-fixed": "#410006",
                        "on-primary-fixed-variant": "#930019",
                        "tertiary-fixed": "#e1e3e4",
                        "on-tertiary-fixed-variant": "#454748",
                        "surface-container-low": "#ecf5fe",
                        "on-surface-variant": "#5b403f",
                        "secondary-fixed-dim": "#c6c6c6",
                        "surface-container": "#e6eff8",
                        "on-secondary-container": "#646464",
                        "primary": "#98001b",
                        "primary-fixed": "#ffdad8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-gap": "64px",
                        "card-padding": "16px",
                        "container-max": "1280px",
                        "gutter": "24px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "spec-label": ["Inter"],
                        "spec-value": ["Inter"],
                        "h3": ["Inter"],
                        "h1": ["Inter"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "h2": ["Inter"],
                        "caption": ["Inter"]
                    },
                    "fontSize": {
                        "spec-label": ["14px", {"lineHeight": "1.4", "fontWeight": "600"}],
                        "spec-value": ["14px", {"lineHeight": "1.4", "fontWeight": "400"}],
                        "h3": ["24px", {"lineHeight": "1.4", "fontWeight": "600"}],
                        "h1": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "h2": ["32px", {"lineHeight": "1.3", "fontWeight": "700"}],
                        "caption": ["12px", {"lineHeight": "1.2", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
</head>
<script type="module" src="/js/pages/product-category.js"></script>
<body class="bg-surface text-on-surface font-body-md">

<!-- Header sẽ được load vào đây -->
<div id="header"></div>

<main class="max-w-[1280px] mx-auto px-6 py-8 mt-20">

    <!-- Tiêu đề danh mục -->
    <section class="mb-8">
        <h1 id="category-title" class="text-3xl font-bold text-on-surface">
            Danh mục sản phẩm
        </h1>

        <p id="category-description" class="text-sm text-secondary mt-2">
            Tìm kiếm sản phẩm phù hợp với nhu cầu của bạn
        </p>
    </section>

    <div class="flex flex-col gap-6">

        <!-- Bộ lọc -->
        <div id="filter-bar"></div>

        <!-- Sắp xếp -->
        <div id="sort-bar"></div>

        <!-- Sau này render product-card vào đây -->
        <div id="product-list"
             class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        </div>

        <!-- Sau này render phân trang -->
        <div id="pagination"></div>

    </div>

</main>

<!-- Footer sẽ được load vào đây -->
<div id="footer"></div>
<script type="module" src="/js/pages/product-category.js"></script>
</body>
</html>
