<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECH-STORE</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#f6faff",
                        "surface-dim": "#d2dbe4",
                        "on-surface": "#141d23",
                        "primary-container": "#be1e2d",
                        "on-background": "#141d23",
                        "surface-bright": "#f6faff",
                        "on-primary-container": "#ffd3d1",
                        "on-tertiary": "#ffffff",
                        "outline": "#8f6f6e",
                        "inverse-primary": "#ffb3b0",
                        "error": "#ba1a1a",
                        "secondary-fixed": "#e2e2e2",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#ffffff",
                        "primary-fixed-dim": "#ffb3b0",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed": "#1b1b1b",
                        "secondary": "#5e5e5e",
                        "secondary-container": "#e2e2e2",
                        "on-tertiary-container": "#dcdedf",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#474747",
                        "inverse-on-surface": "#e9f2fb",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed": "#191c1d",
                        "surface-container-highest": "#dbe4ed",
                        "surface-variant": "#dbe4ed",
                        "background": "#f6faff",
                        "on-primary": "#ffffff",
                        "tertiary": "#484a4b",
                        "tertiary-fixed-dim": "#c5c7c8",
                        "surface-tint": "#b91a2a",
                        "outline-variant": "#e3bebb",
                        "surface-container-high": "#e0e9f2",
                        "tertiary-container": "#5f6263",
                        "inverse-surface": "#293138",
                        "on-primary-fixed": "#410006",
                        "on-primary-fixed-variant": "#930019",
                        "tertiary-fixed": "#e1e3e4",
                        "on-tertiary-fixed-variant": "#454748",
                        "surface-container-low": "#ecf5fe",
                        "on-surface-variant": "#5b403f",
                        "secondary-fixed-dim": "#c6c6c6",
                        "surface-container": "#e6eff8",
                        "on-secondary-container": "#646464",
                        "primary": "#98001b",
                        "primary-fixed": "#ffdad8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-gap": "64px",
                        "card-padding": "16px",
                        "container-max": "1280px",
                        "gutter": "24px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "spec-label": ["Inter"],
                        "spec-value": ["Inter"],
                        "h3": ["Inter"],
                        "h1": ["Inter"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "h2": ["Inter"],
                        "caption": ["Inter"]
                    },
                    "fontSize": {
                        "spec-label": ["14px", {"lineHeight": "1.4", "fontWeight": "600"}],
                        "spec-value": ["14px", {"lineHeight": "1.4", "fontWeight": "400"}],
                        "h3": ["24px", {"lineHeight": "1.4", "fontWeight": "600"}],
                        "h1": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "h2": ["32px", {"lineHeight": "1.3", "fontWeight": "700"}],
                        "caption": ["12px", {"lineHeight": "1.2", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
</head>

<body class="bg-surface text-on-surface font-body-md">

<div id="header"></div>

<main class="pt-24 pb-section-gap px-gutter max-w-container-max mx-auto">
    <section class="grid grid-cols-1 lg:grid-cols-12 gap-gutter items-start">
        <div class="lg:col-span-7 space-y-gutter">
            <div class="bg-white rounded-xl p-8 border border-outline-variant relative overflow-hidden group">
                <img
                        id="main-product-image"
                        alt=""
                        class="w-full h-auto object-contain max-h-[500px]"
                        src="/images/products/default.jpg"
                />
            </div>
        </div>

        <div class="lg:col-span-5 space-y-gutter">
            <div class="bg-white p-6 rounded-xl border border-outline-variant shadow-sm space-y-4">
                <div class="space-y-1">
                    <h1 id="product-name" class="font-h1 text-h1 leading-tight"></h1>
                    <p id="product-brand" class="text-secondary"></p>
                </div>

                <div class="flex items-baseline gap-4">
                    <span id="product-current-price" class="text-h2 font-h2 text-primary"></span>
                    <span id="product-original-price" class="text-body-lg text-secondary line-through"></span>
                    <span id="product-discount" class="bg-primary text-white text-caption px-2 py-1 rounded font-bold"></span>
                </div>

                <div class="bg-surface p-6 rounded-xl border border-outline-variant">
                    <div class="flex items-center gap-2 mb-4">
                        <span class="material-symbols-outlined text-primary text-2xl">
                            featured_seasonal_and_gifts
                        </span>
                        <p class="font-bold text-primary text-lg">Khuyến mãi cực hời</p>
                    </div>

                    <ul class="space-y-3 text-body-sm">
                        <li class="flex items-start gap-3">
                            <span class="material-symbols-outlined text-primary text-xl mt-0.5 flex-shrink-0">
                                check_circle
                            </span>
                            <span>Giảm giá áp dụng theo chương trình Flash Sale nếu có.</span>
                        </li>
                        <li class="flex items-start gap-3">
                            <span class="material-symbols-outlined text-primary text-xl mt-0.5 flex-shrink-0">
                                check_circle
                            </span>
                            <span>Bảo hành chính hãng theo từng sản phẩm.</span>
                        </li>
                    </ul>
                </div>

                <div class="flex gap-2 pt-2">
                    <button id="buy-now-btn" class="flex-1 bg-primary-container hover:bg-primary text-white text-sm font-bold py-3 rounded-xl transition-all duration-200">
                        Mua ngay
                    </button>

                    <button id="add-to-cart-btn" class="flex-1 bg-white border border-gray-300 hover:border-primary-container hover:text-primary-container text-sm font-medium py-3 rounded-xl transition-all duration-200 flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-[22px]">shopping_cart</span>
                        <span>Thêm vào giỏ</span>
                    </button>
                </div>
            </div>
        </div>
    </section>

    <section class="mt-section-gap">
        <div class="flex items-center gap-3 mb-6">
            <span class="material-symbols-outlined text-primary text-3xl">settings</span>
            <h2 class="text-h2 font-h2">Thông số kỹ thuật</h2>
        </div>

        <div class="max-w-[calc(58.333%+12px)]">
            <div class="bg-white border border-outline-variant rounded-2xl overflow-hidden shadow-sm">
                <table class="w-full">
                    <tbody id="product-specs-body" class="divide-y divide-outline-variant"></tbody>
                </table>
            </div>
        </div>
    </section>
</main>

<div id="footer"></div>

<script type="module" src="/js/pages/product-detail.js"></script>

</body>
</html>
