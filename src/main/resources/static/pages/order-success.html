<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đặt hàng thành công - TECH-STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

<div class="bg-white p-10 rounded-2xl shadow text-center max-w-md">
    <h1 class="text-3xl font-bold text-green-600 mb-4">
        Đặt hàng thành công
    </h1>

    <p class="text-gray-600 mb-6">
        Cảm ơn bạn đã đặt hàng tại TECH-STORE.
    </p>

    <p id="order-id" class="font-bold mb-6"></p>

    <a href="/pages/index.html" class="inline-block bg-red-600 text-white px-6 py-3 rounded-xl font-bold">
        Về trang chủ
    </a>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get("id");

    if (orderId) {
        document.getElementById("order-id").textContent = "Mã đơn hàng: #" + orderId;
    }
</script>

</body>
</html>
