<!DOCTYPE html>
<html class="light" lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Quản lý sản phẩm | TechStore Admin</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <link rel="stylesheet" href="/css/admin.css"/>

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface": "#f6faff",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#ecf5fe",
                        "surface-container": "#e6eff8",
                        "surface-bright": "#f6faff",
                        "on-surface": "#141d23",
                        "on-surface-variant": "#5b403f",
                        "primary": "#98001b",
                        "primary-container": "#be1e2d",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#ffd3d1",
                        "secondary": "#5e5e5e",
                        "outline-variant": "#e3bebb",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6"
                    },
                    spacing: {
                        "gutter": "24px",
                        "base": "8px",
                        "container-max": "1280px"
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"]
                    }
                }
            }
        };
    </script>
</head>

<body class="bg-surface text-on-surface overflow-x-hidden">

<div id="admin-sidebar"></div>
<div id="admin-topbar"></div>

<main class="ml-64 mt-1 p-5 min-h-[calc(100vh-4rem)] max-w-full overflow-x-hidden">
    <div class="max-w-container-max mx-auto">

        <div class="flex justify-between items-end mb-6">
            <div>
                <h2 class="text-2xl font-bold text-on-surface mb-1">
                    Quản lý danh mục
                </h2>
                <p class="text-sm text-secondary">
                    Quản lý thông tin sản danh mục
                </p>
            </div>

            <a id="btnAddCategory"
               href="/pages/admin/category-form.html"
               class="bg-primary-container text-on-primary px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-1.5 hover:opacity-90 shadow-md transition-all active:scale-95">
                <span class="material-symbols-outlined text-[18px]">add</span>
                Thêm danh mục
            </a>
        </div>

        <section class="bg-surface-container-lowest rounded-xl border border-outline-variant shadow-sm overflow-hidden">

            <div class="p-5 border-b border-outline-variant flex flex-col md:flex-row gap-4 justify-between items-center bg-surface-bright">

                <div class="flex items-center gap-3 w-full md:w-auto">
                    <div class="relative w-full md:w-80">
                        <span class="material-symbols-outlined absolute left-2.5 top-1/2 -translate-y-1/2 text-on-surface-variant text-[18px]">
                            search
                        </span>

                        <input id="categorySearchInput"
                               class="w-full bg-surface border border-outline-variant rounded-lg py-1.5 pl-8 pr-3 text-xs focus:ring-2 focus:ring-primary outline-none"
                               placeholder="Tìm theo tên danh mục..."
                               type="text"/>
                    </div>
                </div>


            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                    <tr class="bg-surface-container border-b border-outline-variant">

                        <th class="px-gutter py-3 text-[11px] font-bold text-secondary uppercase tracking-wider w-24">
                            ID
                        </th>

                        <th class="px-gutter py-3 text-[11px] font-bold text-secondary uppercase tracking-wider">
                            Tên danh mục
                        </th>

                        <th class="px-gutter py-3 text-[11px] font-bold text-secondary uppercase tracking-wider">
                            Số sản phẩm
                        </th>

                        <th class="px-gutter py-3 text-[11px] font-bold text-secondary uppercase tracking-wider text-right">
                            Thao tác
                        </th>

                    </tr>
                    </thead>

                    <tbody id="categoryTableBody" class="divide-y divide-outline-variant">
                    </tbody>
                </table>
            </div>

            <div class="p-4 border-t border-outline-variant flex justify-between items-center bg-surface-bright">
                <span id="categoryCountText" class="text-[11px] font-medium text-secondary">
                    Đang tải dữ liệu...
                </span>
            </div>

        </section>

    </div>
</main>

<script type="module" src="/js/admin/pages/category-management.js"></script>
</body>
</html>
