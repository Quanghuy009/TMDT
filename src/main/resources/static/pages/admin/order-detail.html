<!DOCTYPE html>
<html class="light" lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Chi tiết đơn hàng | TechStore Admin</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <link rel="stylesheet" href="/css/admin.css"/>

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface": "#f6faff",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#ecf5fe",
                        "surface-container": "#e6eff8",
                        "surface-bright": "#f6faff",
                        "on-surface": "#141d23",
                        "on-surface-variant": "#5b403f",
                        "primary": "#98001b",
                        "primary-container": "#be1e2d",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#ffd3d1",
                        "secondary": "#5e5e5e",
                        "outline": "#8f6f6e",
                        "outline-variant": "#e3bebb",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6"
                    },
                    spacing: {
                        "gutter": "24px",
                        "base": "8px",
                        "container-max": "1280px"
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"]
                    }
                }
            }
        };
    </script>
</head>

<body class="bg-surface text-on-surface overflow-x-hidden">

<div id="admin-sidebar"></div>
<div id="admin-topbar"></div>

<main class="ml-64 mt-1 p-5 min-h-[calc(100vh-4rem)] max-w-full overflow-x-hidden">
    <div class="max-w-container-max mx-auto">

        <div class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-2xl font-bold text-on-surface mb-1" id="page-title">
                    Chi tiết đơn hàng
                </h2>

                <nav class="flex text-[12px] font-medium text-slate-500 mt-1">
                    <span>Đơn hàng</span>
                    <span class="mx-2">/</span>
                    <span class="text-primary font-bold" id="breadcrumb-current">Chi tiết</span>
                </nav>
            </div>

            <div class="flex gap-3">
                <a class="px-4 py-2 border border-slate-300 rounded-lg text-slate-600 font-semibold text-[13px] hover:bg-slate-50 transition-all flex items-center"
                   href="/pages/admin/order-management.html">
                    Quay lại
                </a>

                <a id="btnUpdateOrder"
                   class="px-4 py-2 bg-primary-container text-on-primary rounded-lg font-semibold text-[13px] shadow-md hover:opacity-90 transition-all flex items-center gap-1.5"
                   href="#">
                    <span class="material-symbols-outlined text-[18px]">edit</span>
                    Cập nhật đơn
                </a>
            </div>
        </div>

        <div id="orderDetailContainer" class="space-y-5">
            <section class="bg-surface-container-lowest p-6 rounded-xl border border-outline-variant shadow-sm">
                <p class="text-sm text-secondary">Đang tải dữ liệu đơn hàng...</p>
            </section>
        </div>

    </div>
</main>

<script type="module" src="/js/admin/pages/order-detail.js"></script>

</body>
</html>
